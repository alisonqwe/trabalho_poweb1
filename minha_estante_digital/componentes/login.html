<div class="login-container">

    <div class="login-box">

        <h2>Estante Digital</h2>

        <input type="text" id="usuario" placeholder="Usuário" autocomplete="username" class="form-control mb-2">

        <input type="password" id="senha" placeholder="Senha" autocomplete="current-password" class="form-control mb-3">

        <button type="button" id="btnLogin" class="btn btn-primary w-100">
            Entrar
        </button>

        <p id="mensagemLogin" class="mt-3"></p>

    </div>

</div>
